services:
  workspace:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    init: true
    cap_add:
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      CODEX_HOME: /home/soundatlas/.codex
      SOUNDATLAS_EGRESS_GUARD: enabled
      SOUNDATLAS_ALLOWED_OUTBOUND_PORTS: "8000 5173"
      SOUNDATLAS_WRITABLE_PATHS: /workspace/frontend/node_modules /home/soundatlas/.cache/uv /home/soundatlas/.npm /home/soundatlas/.codex
      UV_PROJECT_ENVIRONMENT: /home/soundatlas/.cache/uv/venvs/backend
    volumes:
      - type: bind
        source: .
        target: /workspace
      - type: volume
        source: codex_home
        target: /home/soundatlas/.codex
      - type: bind
        source: ${USERPROFILE}/.codex/auth.json
        target: /home/soundatlas/.codex/auth.json
      - type: bind
        source: ${USERPROFILE}/.codex/config.toml
        target: /home/soundatlas/.codex/config.toml
      - frontend_node_modules:/workspace/frontend/node_modules
      - backend_uv_cache:/home/soundatlas/.cache/uv
      - frontend_npm_cache:/home/soundatlas/.npm
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started

volumes:
  codex_home:
