services:
  workspace:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    init: true
    cap_add:
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
      - seccomp=unconfined
    environment:
      CODEX_HOME: /home/soundatlas/.codex
      SOUNDATLAS_GIT_AUTHOR_NAME: ${SOUNDATLAS_GIT_AUTHOR_NAME:-}
      SOUNDATLAS_GIT_AUTHOR_EMAIL: ${SOUNDATLAS_GIT_AUTHOR_EMAIL:-}
      SOUNDATLAS_EGRESS_GUARD: enabled
      SOUNDATLAS_ALLOWED_OUTBOUND_PORTS: "8000 5173"
      SOUNDATLAS_WRITABLE_PATHS: /workspace/frontend/node_modules /home/soundatlas/.cache/ms-playwright /home/soundatlas/.cache/uv /home/soundatlas/.npm /home/soundatlas/.codex
      UV_PROJECT_ENVIRONMENT: /home/soundatlas/.cache/uv/venvs/backend
    volumes:
      - type: bind
        source: .
        target: /workspace
      - type: volume
        source: codex_home
        target: /home/soundatlas/.codex
      - type: bind
        source: ${USERPROFILE}/.codex
        target: /mnt/host-codex
        read_only: true
      - frontend_node_modules:/workspace/frontend/node_modules
      - backend_uv_cache:/home/soundatlas/.cache/uv
      - playwright_cache:/home/soundatlas/.cache/ms-playwright
      - frontend_npm_cache:/home/soundatlas/.npm
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started

volumes:
  codex_home:
  playwright_cache:
