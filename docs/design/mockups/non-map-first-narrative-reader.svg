  <rect x="1030" y="158" width="356" height="218" rx="8" fill="#dfe9e2" stroke="#d9e0e7"/>
  <path d="M1060 330 C1120 280 1170 286 1210 250 C1260 205 1312 230 1360 190" fill="none" stroke="#8ca79a" stroke-width="12" opacity=".55"/>
  <circle cx="1184" cy="258" r="13" fill="#e4572e" stroke="#ffffff" stroke-width="4"/>
  <rect x="1030" y="396" width="356" height="98" rx="8" fill="#ffffff" stroke="#d9e0e7"/>
  <text x="1054" y="430" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#17202a">1520 Sedgwick Avenue</text>
  <text x="1054" y="456" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#536170">Mini map stays available as evidence.</text>
  <rect x="1030" y="526" width="356" height="132" rx="8" fill="#ffffff" stroke="#d9e0e7"/>
  <text x="1054" y="560" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#6b7785">RELATED EVENTS</text>
  <text x="1054" y="594" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#17202a">Breakbeat practice</text>
  <text x="1054" y="626" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#17202a">Early Bronx parties</text>
