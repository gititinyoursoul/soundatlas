<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">SoundAtlas non map first concept: Media Archive Board</title>
  <desc id="desc">A desktop concept where reviewed images, media links, and sources become the primary browsing surface, with event and place context as supporting detail.</desc>

