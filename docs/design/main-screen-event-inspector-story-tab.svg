  <text x="1088" y="202" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#536170">1520 Sedgwick Avenue · 1973 · Bronx</text>

  <rect x="1066" y="230" width="326" height="42" rx="8" fill="#eef2f5"/>
  <rect x="1070" y="234" width="104" height="34" rx="7" fill="#ffffff" stroke="#d9e0e7"/>
