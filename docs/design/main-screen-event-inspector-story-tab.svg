  <path d="M59 54 H73 M59 61 H73 M59 68 H73" stroke="#314151" stroke-width="2" stroke-linecap="round"/>
  <text x="104" y="54" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" fill="#6b7785">SOUNDATLAS</text>
  <text x="104" y="79" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#17202a">New York 1965-1985</text>
  <text x="424" y="54" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" fill="#6b7785">ACTIVE ROUTE</text>
  <text x="424" y="78" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#17202a">Birth of Hip-Hop: Bronx 1970-1985</text>
  <rect x="1136" y="43" width="252" height="34" rx="8" fill="#f8fafb" stroke="#d9e0e7"/>
  <circle cx="1160" cy="60" r="5" fill="#2a9d8f"/>
  <text x="1174" y="65" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#536170">9 events · 3 media drafts</text>

  <rect x="24" y="98" width="1018" height="618" fill="#dfe9e2"/>
  <path d="M92 605 C198 532 242 459 335 494 C426 528 465 405 591 425 C712 443 798 338 1007 388" fill="none" stroke="#8ca79a" stroke-width="18" opacity=".55"/>
  <path d="M135 220 C235 172 300 214 394 188 C482 165 534 214 618 190 C698 166 752 208 834 184 C910 162 967 185 1018 158" fill="none" stroke="#a2b6ab" stroke-width="10" opacity=".45"/>
  <circle cx="335" cy="494" r="15" fill="#e4572e" stroke="#ffffff" stroke-width="5"/>
  <circle cx="591" cy="425" r="10" fill="#314151" stroke="#ffffff" stroke-width="4"/>
