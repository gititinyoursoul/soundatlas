  <text x="1106" y="635" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" fill="#536170">3 images</text>
  <rect x="1160" y="618" width="58" height="24" rx="12" fill="#eef2f5"/>
  <text x="1178" y="635" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" fill="#536170">2 links</text>
  <text x="1240" y="635" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" fill="#e4572e">Open Media tab</text>

  <rect x="1066" y="672" width="326" height="128" rx="8" fill="#ffffff" stroke="#d9e0e7"/>
  <text x="1088" y="702" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#6b7785">CONNECTIONS</text>
  <text x="1088" y="732" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#17202a">Connected to early block parties</text>
  <text x="1088" y="756" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#17202a">and sound-system practice.</text>
  <line x1="1088" y1="778" x2="1370" y2="778" stroke="#eef2f5"/>
  <text x="1088" y="798" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" fill="#6b7785">PREV / NEXT EVENT CONTROLS</text>

  <rect x="1070" y="822" width="318" height="30" rx="8" fill="#eef2f5"/>
  <text x="1090" y="842" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#536170">Inspector content scrolls inside this column</text>
</svg>
