  <rect x="64" y="616" width="6" height="72" rx="3" fill="#e4572e"/>
  <text x="88" y="643" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" fill="#6b7785">SELECTED EVENT ON MAP</text>
  <text x="88" y="667" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#17202a">DJ Kool Herc's back-to-school party</text>

  <rect x="24" y="716" width="1018" height="160" fill="#ffffff"/>
  <line x1="64" y1="797" x2="1000" y2="797" stroke="#cfd7df" stroke-width="4"/>
  <circle cx="202" cy="797" r="12" fill="#e4572e"/>
  <circle cx="390" cy="797" r="9" fill="#314151"/>
  <circle cx="602" cy="797" r="9" fill="#314151"/>
  <circle cx="790" cy="797" r="9" fill="#314151"/>
