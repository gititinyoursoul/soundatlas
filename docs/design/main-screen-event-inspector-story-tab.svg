  <text x="1212" y="256" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#536170">Media</text>
  <text x="1320" y="256" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#536170">Sources</text>

  <rect x="1066" y="292" width="326" height="136" rx="8" fill="#ffffff" stroke="#d9e0e7"/>
  <text x="1088" y="322" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#6b7785">SUMMARY</text>
  <text x="1088" y="352" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#17202a">A compact story block explains why</text>
  <text x="1088" y="374" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#17202a">this event matters before media or</text>
  <text x="1088" y="396" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#17202a">source details compete for attention.</text>

  <rect x="1066" y="444" width="326" height="112" rx="8" fill="#fff7f4" stroke="#efc8be"/>
  <text x="1088" y="474" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#bb3f22">SIGNIFICANCE</text>
  <text x="1088" y="504" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#7e2d19">The selected interpretation stays</text>
  <text x="1088" y="526" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#7e2d19">readable without scrolling past media.</text>

  <rect x="1066" y="572" width="326" height="84" rx="8" fill="#ffffff" stroke="#d9e0e7"/>
  <text x="1088" y="602" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#6b7785">MEDIA SUMMARY</text>
