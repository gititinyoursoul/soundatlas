  <text x="186" y="762" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#7e2d19">1973 · selected</text>
  <text x="64" y="846" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#6b7785">Timeline stays compact: sequence context, not another content feed.</text>

  <rect x="1042" y="98" width="374" height="778" fill="#fbfcfd" stroke="#d9e0e7"/>
  <rect x="1066" y="122" width="326" height="96" rx="8" fill="#ffffff" stroke="#d9e0e7"/>
