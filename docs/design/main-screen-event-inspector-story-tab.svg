<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">SoundAtlas desktop main screen mockup with event inspector story tab</title>
  <desc id="desc">A desktop map-first layout with a compact header, large map, quiet timeline, and right-side event inspector showing the story tab.</desc>

  <rect width="1440" height="900" fill="#eef2f5"/>
  <rect x="24" y="24" width="1392" height="852" rx="8" fill="#ffffff" stroke="#d9e0e7"/>

  <rect x="24" y="24" width="1392" height="74" rx="8" fill="#ffffff"/>
