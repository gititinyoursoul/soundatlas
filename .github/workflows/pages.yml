name: Deploy SoundAtlas Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Check frontend
        run: npm run check
        working-directory: frontend

      - name: Test frontend
        run: npm run test
        working-directory: frontend

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: latest

      - name: Test backend
        run: uv run pytest
        working-directory: backend

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build static frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_DATA_MODE: static
          VITE_BASE_PATH: /soundatlas

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/build

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
